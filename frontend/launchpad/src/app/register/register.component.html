<div class="lp-page">

  <!-- Logo -->
  <div class="lp-logo-wrapper">
    <img class="lp-logo" src="assets/logo/Logo_light.svg" alt="Launchpad"/>
  </div>

  <!-- Card -->
  <div class="lp-card">
    <div class="lp-card-body">

      <h4 class="lp-title">Rejestracja</h4>

      <form [formGroup]="registerForm" (ngSubmit)="registerUser()">

        <!-- Full name -->
        <div class="lp-field">
          <label class="lp-label" for="full-name">Imię i nazwisko</label>
          <input id="full-name" class="lp-input" [class.lp-input-invalid]="hasControlError('fullName')" type="text" formControlName="fullName" placeholder="Jan Kowalski">
          <div class="lp-field-error" *ngIf="hasControlError('fullName')">{{ getControlError('fullName') }}</div>
        </div>

        <!-- Email -->
        <div class="lp-field">
          <label for="username" class="lp-label">E-mail</label>
          <input id="username" formControlName="username" type="email"
                 class="lp-input" [class.lp-input-invalid]="hasControlError('username')" placeholder="jan@example.com">
          <div class="lp-field-error" *ngIf="hasControlError('username')">{{ getControlError('username') }}</div>
        </div>

        <!-- Password -->
        <div class="lp-field">
          <label for="password" class="lp-label">Hasło</label>
          <input id="password" formControlName="password" type="password"
                 class="lp-input" [class.lp-input-invalid]="hasControlError('password')" placeholder="Minimum 8 znaków">
          <div class="lp-field-error" *ngIf="hasControlError('password')">{{ getControlError('password') }}</div>
        </div>

        <div class="lp-field">
          <label for="confirm-password" class="lp-label">Powtórz hasło</label>
          <input id="confirm-password" formControlName="confirmPassword" type="password"
                 class="lp-input" [class.lp-input-invalid]="hasControlError('confirmPassword') || passwordMismatch" placeholder="Powtórz hasło">
          <div class="lp-field-error" *ngIf="hasControlError('confirmPassword')">{{ getControlError('confirmPassword') }}</div>
          <div class="lp-field-error" *ngIf="!hasControlError('confirmPassword') && passwordMismatch">Hasła muszą być identyczne.</div>
        </div>

        <!-- Error -->
        <div class="lp-error" *ngIf="errorMessage">{{ errorMessage }}</div>
        <div class="lp-success" *ngIf="successMessage">{{ successMessage }}</div>

        <div class="lp-card-footer">
          <div>
            <button type="button" class="lp-btn lp-btn-secondary" routerLink="/login">
              Masz konto? Zaloguj się
            </button>
          </div>
          <div>
            <button type="submit" class="lp-btn" [disabled]="loading || registerForm.invalid">
              {{ loading ? 'Rejestracja...' : 'Zarejestruj się' }}
            </button>
          </div>
        </div>

      </form>
    </div>
  </div>

</div>
