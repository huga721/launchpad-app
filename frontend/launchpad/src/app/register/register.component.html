<div class="lp-page">

  <!-- Logo -->
  <div class="lp-logo-wrapper">
    <img class="lp-logo" src="assets/logo/Logo_light.svg" alt="Launchpad"/>
  </div>

  <!-- Card -->
  <div class="lp-card">
    <div class="lp-card-body">

      <h4 class="lp-title">Rejestracja</h4>

      <form [formGroup]="registerForm" (ngSubmit)="registerUser()">

        <!-- Full name -->
        <div class="lp-field">
          <label class="lp-label" for="full-name">Imię i nazwisko</label>
          <input id="full-name" class="lp-input" type="text" formControlName="fullName" placeholder="Jan Kowalski">
        </div>

        <!-- Email -->
        <div class="lp-field">
          <label for="username" class="lp-label">E-mail</label>
          <input id="username" formControlName="username" type="email"
                 class="lp-input" placeholder="jan@example.com">
        </div>

        <!-- Password -->
        <div class="lp-field">
          <label for="password" class="lp-label">Hasło</label>
          <input id="password" formControlName="password" type="password"
                 class="lp-input" placeholder="••••••••••••">
        </div>

        <!-- Error -->
        <div class="lp-error" *ngIf="errorMessage">{{ errorMessage }}</div>

        <div class="lp-card-footer">
          <div>
            <button type="button" class="lp-btn lp-btn-secondary" routerLink="/login">
              Masz konto? Zaloguj się
            </button>
          </div>
          <div>
            <button type="submit" class="lp-btn" [disabled]="loading || registerForm.invalid">
              {{ loading ? 'Rejestracja...' : 'Zarejestruj się' }}
            </button>
          </div>
        </div>

      </form>
    </div>
  </div>

</div>
