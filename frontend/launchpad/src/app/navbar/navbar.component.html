<header class="lp-navbar-wrapper">
  <!-- Top dark bar -->
  <nav class="navbar lp-topbar px-3 px-md-4">
    <div class="lp-topbar-left">
      <button type="button" class="btn lp-icon-btn" aria-label="Menu" (click)="toggleSidebar()">
        <img src="assets/icon/Icon_menu.svg" alt="" />
      </button>
    </div>

    <div class="lp-topbar-center">
      <img class="lp-logo" src="assets/logo/Logo_light.svg" alt="Launchpad" />
    </div>

    <div class="lp-topbar-right">
      <button type="button" class="btn lp-icon-btn" aria-label="Home" (click)="goHome()">
        <img src="assets/icon/Icon_home.svg" alt="" />
      </button>
      <button type="button" class="btn lp-icon-btn" aria-label="User" (click)="toggleUserPanel()">
        <img src="assets/icon/Icon_user.svg" alt="" />
      </button>
    </div>
  </nav>

  <!-- Bottom light bar with tabs + project name -->
  <div class="navbar-subbar">
    <div class="lp-tabs">
      <button type="button"
              class="lp-tab"
              [class.lp-tab-active]="activeTab === 'kanban'"
              (click)="selectTab('kanban')">
        Kanban Table
      </button>
      <button type="button"
              class="lp-tab"
              [class.lp-tab-active]="activeTab === 'management'"
              (click)="selectTab('management')">
        User Management
      </button>
    </div>

    <div class="lp-project-name-card" [class.lp-project-name-card-empty]="!activeProject">
      <span class="lp-project-name-label">Aktywny projekt</span>
      <div class="lp-project-name" [title]="activeProject?.name || 'Brak wybranego projektu'">
        {{ activeProject?.name || 'Brak wybranego projektu' }}
      </div>
    </div>
  </div>
</header>

<div class="lp-user-panel-backdrop" *ngIf="userPanelOpen" (click)="closeUserPanel()"></div>

<aside class="lp-user-panel" *ngIf="userPanelOpen">
  <div class="lp-user-icon-wrap">
    <img class="lp-user-panel-icon" src="assets/icon/Icon_user.svg" alt="" />
  </div>

  <div class="lp-user-loading" *ngIf="userLoading">Ładowanie...</div>

  <div class="lp-user-error" *ngIf="!userLoading && userError">
    {{ userError }}
  </div>

  <div class="lp-user-content" *ngIf="!userLoading && !userError && currentUser">
    <div class="lp-user-full-name">{{ currentUser.full_name }}</div>
    <div class="lp-user-role">{{ currentUser.role }}</div>
  </div>

  <button type="button" class="lp-logout-btn" (click)="logout()">Log out</button>
</aside>

<app-project-sidebar
  *ngIf="sidebarOpen"
  (selectedProject)="onProjectSelected($event)"
  (sidebarClose)="sidebarOpen = false">
</app-project-sidebar>
