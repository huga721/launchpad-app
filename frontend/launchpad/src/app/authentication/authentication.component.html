<div class="min-vh-100 d-flex flex-column align-items-center justify-content-center lp-bg py-4">

  <!-- Logo -->
  <div class="d-flex align-items-center gap-2 mb-4">
    <svg width="34" height="34" viewBox="0 0 32 32" fill="none">
      <path d="M6 26 L16 8 L26 26" stroke="#3ecf8e" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
      <line x1="11" y1="20" x2="21" y2="20" stroke="#3ecf8e" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span class="lp-logo-text">aunchpad</span>
  </div>

  <!-- Card -->
  <div class="card border-0 lp-card" style="width: 100%; max-width: 440px;">
    <div class="card-body p-4 p-md-5">

      <h4 class="text-center fw-bold mb-4 lp-title">Login</h4>

      <form [formGroup]="loginForm" (ngSubmit)="authenticateUser()">

        <!-- Email -->
        <div class="mb-3">
          <label for="username" class="form-label lp-label">E-mail</label>
          <div class="input-group">
            <span class="input-group-text lp-input-addon">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="8" r="4" stroke="#3ecf8e" stroke-width="1.8"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#3ecf8e" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              id="username"
              formControlName="username"
              type="email"
              class="form-control lp-input"
              placeholder="johndoe@example.com">
          </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label for="password" class="form-label lp-label">Password</label>
          <div class="input-group">
            <span class="input-group-text lp-input-addon">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                <rect x="5" y="11" width="14" height="10" rx="2" stroke="#3ecf8e" stroke-width="1.8"/>
                <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#3ecf8e" stroke-width="1.8" stroke-linecap="round"/>
                <circle cx="12" cy="16" r="1.5" fill="#3ecf8e"/>
              </svg>
            </span>
            <input
              id="password"
              formControlName="password"
              type="password"
              class="form-control lp-input"
              placeholder="••••••••••••">
          </div>
        </div>

        <!-- Submit -->
        <div class="d-flex justify-content-end">
          <button type="submit" class="btn lp-btn-login d-flex align-items-center gap-2">
            Log in
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" stroke="#3ecf8e" stroke-width="2" stroke-linecap="round"/>
              <polyline points="10 17 15 12 10 7" stroke="#3ecf8e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="15" y1="12" x2="3" y2="12" stroke="#3ecf8e" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

      </form>

    </div>
  </div>

</div>
